# starship prompt config
# translated 1:1 from programs.starship.settings in home.nix.
# bootstrap.ps1 points the STARSHIP_CONFIG env var at this file - edit HERE.

add_newline = false
# single line: folder and ❯ together (kun's original had $line_break before
# $character, which puts the input on its own line - I didn't like that)
format = "$directory$git_branch$git_status$cmd_duration$character"

[character]
success_symbol = "[❯](purple)"
error_symbol = "[❯](red)"

[cmd_duration]
format = "[$duration]($style) "
